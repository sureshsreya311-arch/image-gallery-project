<!DOCTYPE html>
<html>
<head>
    <title>Advanced Image Gallery</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>My Image Gallery</h1>
<!-- SEARCH BAR -->
<input type="text" id="search" placeholder="Search images..." onkeyup="searchImages()">

<!-- DARK MODE BUTTON -->
<button onclick="toggleDarkMode()">🌙 Dark Mode</button>

<!-- SLIDESHOW BUTTON -->
<button onclick="startSlideshow()">▶ Start Slideshow</button>
<button onclick="stopSlideshow()">⏹ Stop</button>


<!-- FILTER BUTTONS -->
<div class="buttons">
  <button onclick="filterSelection('all')" class="active">All</button>
  <button onclick="filterSelection('nature')">Nature</button>
  <button onclick="filterSelection('animal')">Animal</button>
  <button onclick="filterSelection('flower')">Flower</button>
  <button onclick="filterSelection('space')">Space</button>
</div>

<!-- IMAGE GALLERY -->
<div class="gallery">

    <p>Beautiful Nature</p>
    <button onclick="likeImage(this)">❤️ Like</button>
